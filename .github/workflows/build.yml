name: Android APK (front_mobile_android)

on:
  push:
    branches:
      - front_mobile_android
  workflow_dispatch:

permissions:
  contents: write

env:
  MAIN_MODULE: app

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Assemble Debug
        run: ./gradlew :${{ env.MAIN_MODULE }}:assembleDebug

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: ${{ env.MAIN_MODULE }}/build/outputs/apk/debug/*.apk