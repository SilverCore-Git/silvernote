name: Build Mobile Apps

on:
  push:
    branches:
      - front_mobile

permissions:
  contents: write

jobs:
  build-ios:
    name: Build iOS app
    runs-on: macos-latest
    outputs:
      ios-app-path: ${{ steps.upload-ios-artifact.outputs.app-path }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install

      - name: Build iOS app (Debug)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     -derivedDataPath ios/build

      - name: Archive .app for artifact
        run: |
          mkdir -p ios/build/outputs
          cp -R ios/build/Build/Products/Debug-iphonesimulator/App.app ios/build/outputs/

      - name: Upload .app artifact for next job
        id: upload-ios-artifact
        uses: actions/upload-artifact@v4
        with:
          name: Silvernote_iOS_Debug.app
          path: ios/build/outputs/App.app

  build-android:
    name: Build Android app
    runs-on: ubuntu-latest
    outputs:
      android-apk-path: ${{ steps.upload-android-artifact.outputs.apk-path }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew
        working-directory: android

      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload APK artifact for next job
        id: upload-android-artifact
        uses: actions/upload-artifact@v4
        with:
          name: silvernote_install.apk
          path: android/app/build/outputs/apk/debug/silvernote_android_install.apk

  release:
    name: Create GitHub Release with iOS & Android artifacts
    needs:
      - build-ios
      - build-android
    runs-on: ubuntu-latest

    steps:
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Silvernote_iOS_Debug.app
          path: ios_app

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: silvernote_install.apk
          path: android_app

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Silvernote ${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload iOS artifact to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Silvernote ${{ github.run_number }}
          files: ios_app/App.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Android artifact to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Silvernote ${{ github.run_number }}
          files: android_app/silvernote_android_install.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
